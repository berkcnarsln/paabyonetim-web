<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Arka plan -->
  <rect width="64" height="64" rx="13" fill="#0D1424"/>
  <!-- Kutu çerçeve -->
  <rect x="7" y="7" width="50" height="50" rx="10" fill="#1E3A8A22" stroke="#3B82F6" stroke-width="2.5"/>
  <!-- Üst chrome çizgisi -->
  <line x1="14" y1="20" x2="50" y2="20" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- < sol köşeli parantez -->
  <polyline points="20,32 13,42 20,52" fill="none" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / eğik çizgi -->
  <line x1="36" y1="30" x2="28" y2="54" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <!-- > sağ köşeli parantez -->
  <polyline points="44,32 51,42 44,52" fill="none" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
